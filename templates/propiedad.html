<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propiedad — Moret Inmobiliaria</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <meta name="description" content="Consultá esta propiedad en Roberto Moret Inmobiliaria. Más de 30 años de experiencia en el mercado inmobiliario de Buenos Aires.">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="es_AR">
    <meta id="og-title" property="og:title" content="Propiedad — Moret Inmobiliaria">
    <meta id="og-description" property="og:description" content="Consultá esta propiedad en Roberto Moret Inmobiliaria.">
    <meta id="og-image" property="og:image" content="">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/public.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: #111111; background: #FFFFFF;
            -webkit-font-smoothing: antialiased;
        }
        a { text-decoration: none; color: inherit; }

        /* ── HEADER ── */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid #EBEBEB;
        }
        .header-inner {
            max-width: 1280px; margin: 0 auto; padding: 0 32px;
            display: flex; align-items: center; justify-content: space-between;
            height: 62px;
        }
        .logo { display: flex; align-items: center; gap: 11px; }
        .logo img { height: 38px; width: auto; object-fit: contain; }
        .logo-text { line-height: 1; }
        .logo-text .roberto { font-size: 8px; letter-spacing: 3px; color: #BBBBBB; text-transform: uppercase; font-weight: 500; }
        .logo-text .moret { font-size: 24px; font-weight: 400; color: var(--red); letter-spacing: -0.3px; font-family: 'DM Serif Display', Georgia, serif; line-height: 1.1; }
        .logo-text .inmobiliaria { font-size: 8px; letter-spacing: 3px; color: #AAAAAA; text-transform: uppercase; font-weight: 500; }

        .header-actions { display: flex; align-items: center; gap: 8px; }
        .btn-share {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; font-weight: 500; color: #888888;
            background: #F5F5F5; padding: 8px 14px; border-radius: 6px;
            border: none; cursor: pointer; font-family: inherit;
            transition: all 0.15s;
        }
        .btn-share:hover { background: #EBEBEB; color: #111111; }
        .back-btn {
            display: flex; align-items: center; gap: 6px;
            font-size: 13px; font-weight: 500; color: #888888;
            background: #F5F5F5; padding: 8px 14px; border-radius: 6px;
            border: none; cursor: pointer; font-family: inherit;
            transition: all 0.15s;
        }
        .back-btn:hover { background: #EBEBEB; color: #111111; }

        /* ── BREADCRUMB ── */
        .breadcrumb {
            font-size: 12px; color: #999999; margin-bottom: 28px;
            display: flex; align-items: center; gap: 7px;
        }
        .breadcrumb a { color: #666666; font-weight: 500; transition: color 0.15s; }
        .breadcrumb a:hover { color: #111111; }
        .breadcrumb-sep { color: #CCCCCC; }

        /* ── CONTAINER ── */
        .container { max-width: 1280px; margin: 0 auto; padding: 32px 32px 80px; }

        /* ── LAYOUT ── */
        .layout { display: grid; grid-template-columns: minmax(0,1fr) 420px; gap: 36px; align-items: start; }

        /* ── GALLERY ── */
        .gallery { border-radius: 12px; overflow: hidden; border: 1px solid #EBEBEB; background: #F2F2F2; }
        .gallery-main {
            position: relative; aspect-ratio: 16/9; background: #F2F2F2;
            cursor: pointer; overflow: hidden;
        }
        .gallery-main img {
            width: 100%; height: 100%; object-fit: cover; display: block;
            transition: transform 0.5s var(--ease), opacity 0.15s;
        }
        .gallery-main:hover img { transform: scale(1.025); }
        .gallery-main .no-photo {
            width: 100%; height: 100%; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 12px;
            color: #BBBBBB; background: #F5F5F5;
        }
        .gallery-main .no-photo span:first-child { font-size: 52px; opacity: 0.4; }
        .gallery-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 100%; display: flex; justify-content: space-between; padding: 0 14px;
            pointer-events: none; opacity: 0; transition: opacity 0.15s;
        }
        .gallery-main:hover .gallery-nav { opacity: 1; }
        .nav-btn {
            pointer-events: all; background: rgba(255,255,255,0.92); color: #111111;
            border: none; width: 40px; height: 40px; border-radius: 50%;
            font-size: 16px; cursor: pointer; font-weight: 700;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.16); transition: all 0.15s;
        }
        .nav-btn:hover { background: white; transform: scale(1.08); }
        .gallery-count {
            position: absolute; bottom: 14px; right: 14px;
            background: rgba(0,0,0,0.46); color: rgba(255,255,255,0.88);
            font-size: 11px; font-weight: 500; padding: 5px 13px; border-radius: 100px;
            letter-spacing: 0.3px;
        }
        .gallery-expand {
            position: absolute; bottom: 14px; left: 14px;
            background: rgba(0,0,0,0.38); color: rgba(255,255,255,0.85); border: none;
            font-size: 11px; font-weight: 500; padding: 5px 11px; border-radius: 6px;
            cursor: pointer; transition: background 0.15s; letter-spacing: 0.02em;
            font-family: inherit;
        }
        .gallery-expand:hover { background: rgba(0,0,0,0.62); }
        .gallery-thumbs {
            display: flex; gap: 6px; padding: 10px;
            overflow-x: auto; background: #F8F8F8;
            border-top: 1px solid #EBEBEB;
        }
        .gallery-thumbs::-webkit-scrollbar { height: 3px; }
        .gallery-thumbs::-webkit-scrollbar-thumb { background: #DDDDDD; border-radius: 2px; }
        .thumb {
            flex-shrink: 0; width: 80px; height: 58px; border-radius: 6px;
            overflow: hidden; cursor: pointer; border: 2px solid transparent;
            transition: all 0.15s; opacity: 0.6;
        }
        .thumb.active { border-color: #111111; opacity: 1; }
        .thumb:hover { opacity: 1; }
        .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* ── DETAILS ── */
        .details {
            position: sticky; top: calc(62px + 20px);
            display: flex; flex-direction: column; gap: 16px;
        }
        .detail-card {
            background: #FFFFFF; border-radius: 12px; padding: 24px;
            border: 1px solid #EBEBEB;
        }

        .prop-badges { display: flex; gap: 7px; margin-bottom: 16px; flex-wrap: wrap; }
        .badge {
            font-size: 9.5px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.8px; padding: 4px 11px; border-radius: 4px;
        }
        .badge-venta      { background: var(--red); color: white; }
        .badge-alquiler   { background: #111111; color: white; }
        .badge-disponible { background: #D1FAE5; color: #065F46; }
        .badge-vendida    { background: #FEE2E2; color: #991B1B; }
        .badge-rentada    { background: #FEF3C7; color: #92400E; }
        .badge-cerrada    { background: #F2F2F2; color: #888888; }
        .badge-tipo       { background: #F2F2F2; color: #444444; }

        .prop-price {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: 42px; font-weight: 400; color: #111111;
            margin-bottom: 10px; line-height: 1; letter-spacing: -0.02em;
        }
        .prop-price .currency { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 500; color: #AAAAAA; margin-right: 4px; }
        .prop-price .consultar { font-family: 'Inter', sans-serif; font-size: 24px; font-weight: 600; color: #888888; }

        .prop-address {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: 22px; font-weight: 400; color: #111111;
            margin-bottom: 5px; line-height: 1.2; letter-spacing: -0.01em;
        }
        .prop-barrio { font-size: 13px; color: #888888; margin-bottom: 20px; }

        .prop-specs { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-top: 4px; }
        .spec-item {
            background: #F7F7F7; border-radius: 8px; padding: 12px 14px;
            border: 1px solid #EBEBEB;
        }
        .spec-item .spec-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: #999999; margin-bottom: 5px; font-weight: 600; }
        .spec-item .spec-value { font-size: 15px; font-weight: 600; color: #111111; }

        .prop-desc { font-size: 14px; line-height: 1.8; color: #555555; white-space: pre-wrap; }

        /* ── CONTACT CARD ── */
        .contact-card h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #111111; text-align: center; }
        .contact-btns { display: flex; flex-direction: row; gap: 10px; margin-bottom: 20px; }
        .btn-wa, .btn-gmail {
            flex: 1; display: flex; align-items: center; justify-content: center;
            height: 52px; border-radius: 10px; transition: all 0.2s;
        }
        .btn-wa {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white; box-shadow: 0 4px 16px rgba(34,197,94,0.28);
        }
        .btn-wa:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(34,197,94,0.38); }
        .btn-gmail {
            background: #FFFFFF; border: 1.5px solid #E5E5E5;
        }
        .btn-gmail:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.10); border-color: #CCCCCC; }


        /* ── LIGHTBOX ── */
        .lightbox {
            display: none; position: fixed; inset: 0;
            background: rgba(8,10,14,0.97); z-index: 200;
            align-items: center; justify-content: center;
        }
        .lightbox.active { display: flex; }
        .lb-img { max-width: 92vw; max-height: 90vh; border-radius: 4px; display: block; box-shadow: 0 0 80px rgba(0,0,0,0.6); }
        .lb-close {
            position: absolute; top: 18px; right: 22px;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.8); font-size: 18px; cursor: pointer;
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; backdrop-filter: blur(8px);
        }
        .lb-close:hover { background: rgba(255,255,255,0.2); color: white; }
        .lb-nav {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 100%; display: flex; justify-content: space-between; padding: 0 18px;
        }
        .lb-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.85); width: 52px; height: 52px; border-radius: 50%;
            font-size: 20px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.15s; backdrop-filter: blur(8px);
        }
        .lb-btn:hover { background: rgba(255,255,255,0.2); color: white; }
        .lb-counter {
            position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 500;
            background: rgba(0,0,0,0.3); padding: 5px 16px; border-radius: 100px;
            letter-spacing: 0.5px;
        }

        /* ── SIMILARES ── */
        .similares { margin-top: 52px; padding-top: 36px; border-top: 1px solid #EBEBEB; }
        .similares-title {
            font-family: 'DM Serif Display', Georgia, serif;
            font-size: 22px; font-weight: 400; color: #111111;
            margin-bottom: 22px; letter-spacing: -0.01em;
        }
        .sim-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }
        .sim-card {
            background: #FFFFFF; border-radius: 10px; overflow: hidden;
            border: 1px solid #EBEBEB; display: flex; flex-direction: column;
            transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease), border-color 0.25s;
        }
        .sim-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.10); border-color: transparent; }
        .sim-photo { aspect-ratio: 16/10; overflow: hidden; background: #F2F2F2; flex-shrink: 0; }
        .sim-photo img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.4s var(--ease); }
        .sim-card:hover .sim-photo img { transform: scale(1.05); }
        .sim-no-photo { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #CCCCCC; }
        .sim-body { padding: 15px 16px 16px; flex: 1; display: flex; flex-direction: column; }
        .sim-price { font-size: 18px; font-weight: 700; color: #111111; margin-bottom: 5px; letter-spacing: -0.3px; }
        .sim-addr { font-family: 'DM Serif Display', Georgia, serif; font-size: 15px; font-weight: 400; color: #111111; margin-bottom: 3px; line-height: 1.3; }
        .sim-barrio { font-size: 12px; color: #888888; margin-bottom: 14px; }
        .sim-btn {
            display: block; text-align: center;
            background: #F7F7F7; color: #888888;
            font-weight: 600; font-size: 12.5px; padding: 9px; border-radius: 6px;
            margin-top: auto; transition: all 0.15s;
        }
        .sim-card:hover .sim-btn { background: #F0F0F0; color: #111111; }

        /* ── MAP ── */
        #pub-geo-map { height: 320px; border-radius: 10px; overflow: hidden; border: 1px solid #EBEBEB; margin-top: 20px; }
        @media print { #pub-geo-map { display: none !important; } }

        /* ── PRINT ── */
        .print-only { display: none; }
        @media print {
            * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .header { position: static; box-shadow: none; border-bottom: 2px solid var(--red); background: white; }
            .header-inner { height: auto; padding: 14px 20px; }
            #btn-share, #btn-print, .back-btn,
            .gallery-nav, .gallery-expand, .gallery-thumbs, .gallery-count,
            .lightbox, #similares-section,
            .btn-wa, .btn-gmail,
            .breadcrumb { display: none !important; }
            .container { padding: 16px; }
            .layout { grid-template-columns: 1fr; gap: 16px; }
            .details { position: static; }
            .detail-card { border: 1px solid #EBEBEB; break-inside: avoid; }
            .gallery { break-inside: avoid; }
            .gallery-main { aspect-ratio: 16/9; }
            .contact-card h3 { display: none; }
            .print-only { display: block; font-size: 12px; color: #555; margin-top: 8px; }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 960px) {
            .layout { grid-template-columns: 1fr; }
            .details { position: static; }
        }
        @media (max-width: 640px) {
            .header-inner { padding: 0 16px; height: 60px; }
            .container { padding: 20px 16px 60px; }
            .breadcrumb { margin-bottom: 20px; }
            .gallery-main { aspect-ratio: 4/3; }
            .prop-specs { grid-template-columns: repeat(2, 1fr); }
            .prop-price { font-size: 34px; }
            .prop-address { font-size: 20px; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <a href="/" class="logo">
            <img src="/static/logo.png" alt="Moret Inmobiliaria" onerror="this.style.display='none'">
            <div class="logo-text">
                <div class="roberto">Roberto</div>
                <div class="moret">Moret</div>
                <div class="inmobiliaria">Inmobiliaria</div>
            </div>
        </a>
        <div class="header-actions">
            <button class="btn-share" id="btn-print" onclick="window.print()" style="display:none">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4"/></svg>
                Imprimir
            </button>
            <button class="btn-share" onclick="compartir()" id="btn-share" style="display:none">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/></svg>
                Compartir
            </button>
            <a id="back-btn" href="/" class="back-btn">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
                Volver
            </a>
        </div>
    </div>
</header>

<div class="container">
    <div class="breadcrumb">
        <a href="/">Inicio</a>
        <span class="breadcrumb-sep">/</span>
        <a href="/">Propiedades</a>
        <span class="breadcrumb-sep">/</span>
        <span id="bc-dir">Cargando...</span>
    </div>

    <div class="layout" id="layout">
        <div style="text-align:center;padding:80px;color:#A8A4A0">
            <div style="font-size:40px;margin-bottom:12px;opacity:0.4">🏠</div>
            <div style="font-size:14px">Cargando propiedad...</div>
        </div>
    </div>
    <div id="similares-section"></div>
</div>

<div id="lightbox" class="lightbox">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <div class="lb-nav">
        <button class="lb-btn" onclick="lbNav(-1)">❮</button>
        <button class="lb-btn" onclick="lbNav(1)">❯</button>
    </div>
    <img id="lb-img" class="lb-img" src="" alt="">
    <div id="lb-counter" class="lb-counter"></div>
</div>

<script>
    const propiedadId = {{ propiedad_id }};
    let fotos = [];
    let fotoActual = 0;

    function waLink(phone) {
        const d = String(phone).replace(/\D/g, '');
        const intl = d.startsWith('54') ? d : d.startsWith('0') ? '54' + d.slice(1) : '54' + d;
        return `https://wa.me/${intl}`;
    }

    const TELEFONO = '{{ contacto_telefono }}';
    const WA_NUM   = '{{ contacto_wa }}';
    const EMAIL    = '{{ contacto_email }}';

    function formatPrecio(p) {
        if (p.precio_a_consultar || !p.rango_min) return `<span class="consultar">$ consultar</span>`;
        const moneda = p.es_usd ? 'USD' : '$';
        let str = `<span class="currency">${moneda}</span>${p.rango_min.toLocaleString('es-AR')}`;
        if (p.rango_max && p.rango_max !== p.rango_min)
            str += ` <span style="font-family:'Inter',sans-serif;font-size:18px;color:#aaa;font-weight:400"> – ${p.rango_max.toLocaleString('es-AR')}</span>`;
        return str;
    }

    function cargar() {
        fetch(`/api/public/propiedades/${propiedadId}`)
            .then(r => {
                if (!r.ok) throw new Error('No encontrada');
                return r.json();
            })
            .then(p => renderPropiedad(p))
            .catch(() => {
                document.getElementById('layout').innerHTML = `
                    <div style="text-align:center;padding:72px;color:#888">
                        <div style="font-size:42px;margin-bottom:14px;opacity:0.35">🏠</div>
                        <h2 style="font-family:'DM Serif Display',serif;font-weight:400;margin-bottom:8px;font-size:26px">Propiedad no encontrada</h2>
                        <p style="color:#999;font-size:14px">Es posible que ya no esté disponible. <a href="/" style="color:var(--red)">Ver otras propiedades</a></p>
                    </div>`;
            });
    }

    function renderPropiedad(p) {
        fotos = p.fotos || [];
        fotoActual = 0;

        const titulo = `${p.direccion} — Moret Inmobiliaria`;
        document.title = titulo;
        document.getElementById('bc-dir').textContent = p.direccion;

        document.getElementById('og-title').content = titulo;
        const desc = `${p.tipo ? capitalizar(p.tipo) + ' en ' : ''}${capitalizar(p.operacion || '')} — ${p.direccion}${p.barrio ? ', ' + p.barrio : ''}`;
        document.getElementById('og-description').content = desc;
        if (fotos.length > 0) document.getElementById('og-image').content = '/' + fotos[0];

        const refTab = new URLSearchParams(document.referrer.split('?')[1] || '').get('tab');
        document.getElementById('back-btn').href = refTab ? `/?tab=${refTab}` : '/';

        document.getElementById('btn-share').style.display = 'flex';
        document.getElementById('btn-print').style.display = 'flex';

        const gal = renderGallery();
        const msgDefecto = `Hola, me interesa la propiedad en ${p.direccion}${p.barrio ? ' (' + p.barrio + ')' : ''}.`;

        document.getElementById('layout').innerHTML = `
        <div>
            ${gal}
            ${p.descripcion ? `
            <div class="detail-card" style="margin-top:20px">
                <h3 style="font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;margin-bottom:14px;color:var(--ink)">Descripción</h3>
                <p class="prop-desc">${escHtml(p.descripcion)}</p>
            </div>` : ''}
            ${(p.lat != null || p.geojson_geometry) ? '<div id="pub-geo-map"></div>' : ''}
        </div>
        <div class="details">
            <div class="detail-card">
                <div class="prop-badges">
                    ${p.operacion ? `<span class="badge badge-${p.operacion}">${p.operacion}</span>` : ''}
                    ${p.tipo      ? `<span class="badge badge-tipo">${p.tipo}</span>`                 : ''}
                    ${p.estado    ? `<span class="badge badge-${p.estado}">${p.estado}</span>`        : ''}
                </div>
                <div class="prop-price">${formatPrecio(p)}</div>
                <div class="prop-address">${p.direccion}</div>
                ${p.barrio ? `<div class="prop-barrio">📍 ${p.barrio}</div>` : ''}
                <div class="prop-specs">
                    ${p.ambientes ? `<div class="spec-item"><div class="spec-label">Ambientes</div><div class="spec-value">${p.ambientes}</div></div>` : ''}
                    ${p.tipo      ? `<div class="spec-item"><div class="spec-label">Tipo</div><div class="spec-value">${capitalizar(p.tipo)}</div></div>` : ''}
                    ${p.operacion ? `<div class="spec-item"><div class="spec-label">Operación</div><div class="spec-value">${capitalizar(p.operacion)}</div></div>` : ''}
                    ${p.barrio    ? `<div class="spec-item"><div class="spec-label">Barrio</div><div class="spec-value">${p.barrio}</div></div>` : ''}
                </div>
            </div>

            <div class="detail-card contact-card">
                <h3>¿Te interesa esta propiedad? Consultanos</h3>
                <div class="contact-btns">
                    <a href="${waLink(WA_NUM)}?text=${encodeURIComponent(msgDefecto)}" target="_blank" class="btn-wa" title="WhatsApp">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.126 1.532 5.859L0 24l6.305-1.654A11.954 11.954 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.371l-.359-.214-3.724.977.995-3.635-.234-.373A9.818 9.818 0 012.182 12C2.182 6.58 6.58 2.182 12 2.182S21.818 6.58 21.818 12 17.42 21.818 12 21.818z"/></svg>
                    </a>
                    <a href="mailto:robertomoret55@gmail.com" class="btn-gmail" title="Email">
                        <svg width="22" height="22" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                            <path fill="#4CAF50" d="M45 16.2l-5 2.75-5 4.75V40h7a3 3 0 003-3V19.4a2 2 0 00-1-1.73z"/>
                            <path fill="#1565C0" d="M3 16.2l3.5 2.75L11 23.7V40H4a3 3 0 01-3-3V19.4a2 2 0 011-1.73z"/>
                            <polygon fill="#E53935" points="35,11.2 24,19.45 13,11.2 12,17 13,23 24,31.25 35,23 36,17"/>
                            <path fill="#C62828" d="M3 12.298V16.2l10 7.5V11.2L9 9.298A3.162 3.162 0 003 12.298z"/>
                            <path fill="#FBC02D" d="M45 12.298V16.2l-10 7.5V11.2l4-2.902A3.162 3.162 0 0145 12.298z"/>
                        </svg>
                    </a>
                </div>
                <div class="print-only">📞 ${TELEFONO} &nbsp;·&nbsp; Roberto Moret Inmobiliaria</div>
            </div>
        </div>`;

        bindGalleryEvents();
        initPublicGeoMap(p);
        cargarSimilares(p);
    }

    function cargarSimilares(p) {
        if (!p.tipo && !p.operacion) return;
        const params = new URLSearchParams();
        if (p.tipo)      params.set('tipo', p.tipo);
        if (p.operacion) params.set('operacion', p.operacion);
        fetch('/api/public/propiedades?' + params.toString())
            .then(r => r.json())
            .then(lista => {
                const otras = lista.filter(x => x.id !== p.id).slice(0, 3);
                if (!otras.length) return;
                document.getElementById('similares-section').innerHTML = `
                <div class="similares">
                    <div class="similares-title">También te puede interesar</div>
                    <div class="sim-grid">${otras.map(renderSimCard).join('')}</div>
                </div>`;
            }).catch(() => {});
    }

    function thumbUrl(path) {
        if (!path) return path;
        var m = 'uploads/properties/';
        if (path.indexOf(m) !== -1 && path.indexOf('/thumbs/') === -1)
            return path.replace(m, m + 'thumbs/');
        return path;
    }

    function renderSimCard(p) {
        const foto   = p.fotos && p.fotos.length
            ? `<img src="/${thumbUrl(p.fotos[0])}" alt="${escHtml(p.direccion)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=sim-no-photo>🏠</div>'">`
            : '<div class="sim-no-photo">🏠</div>';
        const precio = p.precio_a_consultar || !p.rango_min
            ? 'Consultar precio'
            : `${p.es_usd ? 'USD' : '$'} ${Number(p.rango_min).toLocaleString('es-AR')}`;
        return `
        <a href="/propiedad/${p.id}" class="sim-card">
            <div class="sim-photo">${foto}</div>
            <div class="sim-body">
                <div class="sim-price">${precio}</div>
                <div class="sim-addr">${escHtml(p.direccion)}</div>
                ${p.barrio ? `<div class="sim-barrio">📍 ${escHtml(p.barrio)}</div>` : ''}
                <div class="sim-btn">Ver propiedad →</div>
            </div>
        </a>`;
    }

    function renderGallery() {
        if (fotos.length === 0) {
            return `<div class="gallery">
                <div class="gallery-main">
                    <div class="no-photo"><span>🏠</span><span style="font-size:14px;color:#bbb">Sin fotos disponibles</span></div>
                </div>
            </div>`;
        }
        const mainImg = `<img id="main-img" src="/${fotos[0]}" alt="Foto principal" onclick="openLightbox(0)"
            onerror="this.parentElement.innerHTML='<div class=no-photo><span>🏠</span></div>'">`;
        const thumbs = fotos.map((f, i) =>
            `<div class="thumb ${i === 0 ? 'active' : ''}" data-idx="${i}" onclick="setFoto(${i})">
                <img src="/${f}" alt="Foto ${i+1}" loading="lazy" onerror="this.parentElement.style.display='none'">
            </div>`).join('');
        return `
        <div class="gallery">
            <div class="gallery-main">
                ${mainImg}
                ${fotos.length > 1 ? `<div class="gallery-nav">
                    <button class="nav-btn" onclick="setFoto(fotoActual - 1)">‹</button>
                    <button class="nav-btn" onclick="setFoto(fotoActual + 1)">›</button>
                </div>` : ''}
                <div class="gallery-count" id="gallery-count">📷 1 / ${fotos.length}</div>
                <button class="gallery-expand" onclick="openLightbox(fotoActual)">⤢ Ampliar</button>
            </div>
            ${fotos.length > 1 ? `<div class="gallery-thumbs">${thumbs}</div>` : ''}
        </div>`;
    }

    function bindGalleryEvents() {
        const main = document.querySelector('.gallery-main');
        if (!main || fotos.length <= 1) return;
        let startX = 0, dragging = false;
        main.addEventListener('touchstart', e => { startX = e.touches[0].clientX; dragging = true; }, { passive: true });
        main.addEventListener('touchend', e => {
            if (!dragging) return; dragging = false;
            const dx = e.changedTouches[0].clientX - startX;
            if (Math.abs(dx) > 40) setFoto(fotoActual + (dx < 0 ? 1 : -1));
        });
    }

    function setFoto(idx) {
        if (fotos.length === 0) return;
        fotoActual = ((idx % fotos.length) + fotos.length) % fotos.length;
        const img = document.getElementById('main-img');
        if (img) img.src = '/' + fotos[fotoActual];
        document.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === fotoActual));
        const cnt = document.getElementById('gallery-count');
        if (cnt) cnt.textContent = `📷 ${fotoActual + 1} / ${fotos.length}`;
    }

    function lbUpdateCounter() {
        const el = document.getElementById('lb-counter');
        if (el && fotos.length > 1) el.textContent = `${fotoActual + 1} / ${fotos.length}`;
        else if (el) el.textContent = '';
    }

    function openLightbox(idx) {
        fotoActual = idx;
        document.getElementById('lb-img').src = '/' + fotos[fotoActual];
        document.getElementById('lightbox').classList.add('active');
        lbUpdateCounter();
    }

    function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }

    function lbNav(dir) {
        fotoActual = ((fotoActual + dir + fotos.length) % fotos.length);
        document.getElementById('lb-img').src = '/' + fotos[fotoActual];
        setFoto(fotoActual);
        lbUpdateCounter();
    }

    function compartir() {
        const url = window.location.href;
        if (navigator.share) {
            navigator.share({ title: document.title, url }).catch(() => {});
        } else {
            navigator.clipboard.writeText(url).then(() => {
                const btn = document.getElementById('btn-share');
                const orig = btn.innerHTML;
                btn.innerHTML = '✓ Link copiado';
                setTimeout(() => { btn.innerHTML = orig; }, 2000);
            }).catch(() => {});
        }
    }

    document.getElementById('lightbox').addEventListener('click', function(e) {
        if (e.target === this) closeLightbox();
    });
    document.addEventListener('keydown', e => {
        if (document.getElementById('lightbox').classList.contains('active')) {
            if (e.key === 'ArrowLeft') lbNav(-1);
            if (e.key === 'ArrowRight') lbNav(1);
            if (e.key === 'Escape') closeLightbox();
        }
    });

    function capitalizar(str) { return str ? str.charAt(0).toUpperCase() + str.slice(1) : ''; }
    function escHtml(str) {
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function initPublicGeoMap(p) {
        if (p.lat == null && !p.geojson_geometry) return;
        var el = document.getElementById('pub-geo-map');
        if (!el) return;
        var map = L.map(el, { zoomControl: true, scrollWheelZoom: false });
        L.tileLayer(
            'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
            { attribution: 'Tiles &copy; Esri', maxZoom: 19 }
        ).addTo(map);
        if (p.geojson_geometry) {
            var geom = typeof p.geojson_geometry === 'string' ? JSON.parse(p.geojson_geometry) : p.geojson_geometry;
            var layer = L.geoJSON({ type: 'Feature', geometry: geom, properties: {} }, {
                style: { color: '#C41230', weight: 2.5, fillColor: '#C41230', fillOpacity: 0.18 }
            }).addTo(map);
            map.fitBounds(layer.getBounds(), { padding: [24, 24] });
        } else {
            L.marker([p.lat, p.lng]).addTo(map);
            map.setView([p.lat, p.lng], 15);
        }
    }

    document.addEventListener('DOMContentLoaded', cargar);
</script>
</body>
</html>
