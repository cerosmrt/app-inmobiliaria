<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}Panel Admin{% endblock %} — Moret Inmobiliaria</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
    {% block head %}{% endblock %}
</head>
<body>

{% block header %}
<header class="app-header">
    <div class="header-brand">
        <span class="moret">Moret</span>
        <span class="sub">PANEL ADMIN</span>
    </div>
    {% block header_nav %}
    <nav class="header-nav">
        <a href="/" target="_blank">Ver sitio</a>
        <a href="/admin/consultas" id="link-consultas">
            Consultas
            <span class="badge-count" id="badge-consultas"></span>
        </a>
    </nav>
    {% if admin_username %}<span class="admin-tag">{{ admin_username }}</span>{% endif %}
    {% endblock %}
    <a href="/admin/logout" class="btn-logout">Salir</a>
</header>
{% endblock %}

{% block content %}{% endblock %}

<div id="toast-container"></div>

<!-- Command Palette -->
<div id="palette-overlay" class="modal-overlay" style="align-items:flex-start;padding-top:14vh">
    <div style="background:white;border-radius:12px;width:560px;max-width:92%;box-shadow:0 24px 60px rgba(0,0,0,0.35);overflow:hidden;animation:fadeIn 0.12s ease">
        <div style="display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--border)">
            <span style="font-size:17px;color:var(--muted)">&#x2315;</span>
            <input id="palette-input" type="text" placeholder="Buscar propiedades, clientes, acciones..."
                   oninput="buscarEnPalette(this.value)" onkeydown="paletteKeyNav(event)" autocomplete="off"
                   style="flex:1;border:none;font-size:15px;outline:none">
            <kbd style="font-size:11px;padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--bg);color:var(--muted)">ESC</kbd>
        </div>
        <div id="palette-list" style="max-height:340px;overflow-y:auto"></div>
    </div>
</div>

<div id="confirm-overlay" class="modal-overlay">
    <div class="modal-box" style="max-width:400px;max-height:none">
        <div class="modal-header" style="border-bottom:none;margin-bottom:4px;padding-bottom:0">
            <h3 id="confirm-titulo">Confirmar</h3>
        </div>
        <p id="confirm-mensaje" style="color:var(--muted);font-size:14px;margin:0 0 20px"></p>
        <div class="modal-footer" style="margin-top:0">
            <button class="btn btn-gray" onclick="resolveConfirm(false)">Cancelar</button>
            <button class="btn btn-cancel" id="confirm-btn-ok" onclick="resolveConfirm(true)">Eliminar</button>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='admin.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
