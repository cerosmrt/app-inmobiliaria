{% extends "admin/base.html" %}

{% block title %}Perfil de Cliente{% endblock %}

{% block header %}
<header class="app-header" style="background:var(--navy);padding:12px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.25)">
    <span style="font-size:24px">&#x1F3E0;</span>
    <h1 id="header-nombre" style="margin:0;font-size:18px;font-weight:700;flex:1">Perfil de Cliente</h1>
    <a href="/admin" class="back-link">&#x2190; Volver al panel</a>
</header>
{% endblock %}

{% block head %}
<style>
    .container { max-width: 1200px; margin: 0 auto; padding: 24px; }

    .layout { display: flex; gap: 24px; align-items: flex-start; }

    .info-card {
        width: 240px; flex-shrink: 0; background: white;
        border-radius: 10px; padding: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.09);
        border-top: 4px solid var(--navy);
    }
    .info-card .avatar {
        width: 56px; height: 56px; border-radius: 50%;
        background: var(--navy); color: white;
        display: flex; align-items: center; justify-content: center;
        font-size: 22px; font-weight: 700; margin: 0 auto 14px;
    }
    .info-card h2 { margin: 0 0 14px; font-size: 16px; text-align: center; }
    .info-row { margin-bottom: 10px; font-size: 13px; }
    .info-row .label { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
    .info-row .value { font-weight: 600; word-break: break-word; }
    .wa-btn {
        display: inline-flex; align-items: center; gap: 5px;
        background: #dcfce7; color: #15803d; text-decoration: none;
        font-size: 12px; font-weight: 600; padding: 5px 12px;
        border-radius: 6px; margin-top: 10px; width: 100%;
        justify-content: center; transition: opacity 0.15s;
    }
    .wa-btn:hover { opacity: 0.8; text-decoration: none; }

    .detail { flex: 1; min-width: 0; }

    .section-card {
        background: white; border-radius: 10px; padding: 20px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.09); margin-bottom: 20px;
    }
    .section-card h2 {
        margin: 0 0 14px; font-size: 15px; color: var(--navy);
        border-bottom: 1px solid var(--border); padding-bottom: 10px;
        display: flex; align-items: center; gap: 7px;
    }

    .pref-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    .pref-item { background: var(--bg); border-radius: 6px; padding: 10px 12px; }
    .pref-item .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; }
    .pref-item .value { font-size: 16px; font-weight: 700; margin-top: 2px; }

    .table-wrap { border-radius: 8px; overflow: hidden; border: 1px solid var(--border); box-shadow: none; }
    thead th { background: #334155; position: static; padding: 9px 10px; font-size: 11px; }
    td { padding: 8px 10px; }
    tbody tr:hover td { background: #dbeafe; }

    .notes-textarea { min-height: 100px; }
    .notes-textarea:focus { outline: 2px solid var(--blue); }
    .save-confirm { font-size: 12px; color: #16a34a; margin-left: 10px; display: none; }

    .buscar-wrap { position: relative; margin-top: 12px; }
    .buscar-wrap input {
        width: 100%; font-size: 13px; padding: 8px 12px;
        border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box;
    }
    .buscar-wrap input:focus { outline: 2px solid var(--blue); border-color: transparent; }
    #buscar-prop-cli-resultados {
        max-height: 260px; overflow-y: auto;
        border: 1px solid var(--border); border-radius: 6px; margin-top: 8px;
    }
    .disp-empty { color: var(--muted); font-size: 13px; padding: 8px 4px; }
    .inter-subtitulo {
        font-size: 11px; color: var(--muted); text-transform: uppercase;
        letter-spacing: 0.5px; font-weight: 700; margin: 14px 0 6px;
    }
    .inter-row {
        display: flex; align-items: center; gap: 8px; padding: 8px 10px;
        border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .inter-row:last-child { border-bottom: none; }
    .inter-nombre { flex: 1; font-weight: 600; word-break: break-word; }
    .inter-sep { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="layout">
        <div class="info-card" id="cliente-info">
            <div style="text-align:center;color:#94a3b8;padding:20px">Cargando...</div>
        </div>
        <div class="detail" id="detalle-cliente"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const clienteId = {{ cliente_id }};
    var _clienteData      = null;
    var _propiedadesCache = null;

    // ── Carga principal ───────────────────────────────────────────────────────
    function cargarPerfil() {
        fetch('/api/clientes/' + clienteId)
            .then(function(r) {
                if (!r.ok) throw new Error('Cliente no encontrado');
                return r.json();
            })
            .then(function(data) {
                _clienteData = data;
                document.getElementById('header-nombre').textContent = data.nombre + ' ' + data.apellido;
                var initials = ((data.nombre[0] || '') + (data.apellido[0] || '')).toUpperCase();
                document.getElementById('cliente-info').innerHTML =
                    '<div class="avatar">' + esc(initials) + '</div>' +
                    '<h2>' + esc(data.nombre) + ' ' + esc(data.apellido) + '</h2>' +
                    '<div class="info-row"><div class="label">Tipo</div>' +
                        '<div class="value"><span class="badge badge-' + esc(data.tipo) + '">' + esc(data.tipo) + '</span></div></div>' +
                    '<div class="info-row"><div class="label">Tel&eacute;fono</div>' +
                        '<div class="value">' + esc(data.telefono) + '</div></div>' +
                    (data.email ? '<div class="info-row"><div class="label">Email</div><div class="value">' + esc(data.email) + '</div></div>' : '') +
                    '<a href="' + waLink(data.telefono) + '" target="_blank" class="wa-btn">&#x1F4AC; WhatsApp</a>';
                renderDetalle(data);
            })
            .catch(function(err) {
                document.getElementById('cliente-info').innerHTML = '<p style="color:#dc2626">' + esc(err.message) + '</p>';
            });
    }

    // ── Render del panel derecho ──────────────────────────────────────────────
    function renderDetalle(data) {
        var html = '';
        if (data.tipo === 'interesado') html += renderPreferencias(data);
        html += renderPropiedades(data);
        html += renderNotas(data);
        document.getElementById('detalle-cliente').innerHTML = html;
        // Populate the disponibles list after DOM is ready
        var esProp = data.tipo === 'propietario';
        var props   = esProp ? (data.propiedades_propietario || []) : (data.propiedades_interesado || []);
        var vinculadas = {};
        props.forEach(function(p) { vinculadas[p.id] = true; });
        var rol = esProp ? 'propietarios' : 'interesados';
        renderDispListProp('buscar-prop-cli-resultados', vinculadas, rol);
    }

    function renderPreferencias(data) {
        return '<div class="section-card"><h2>&#x2699; Preferencias de b&uacute;squeda</h2>' +
            '<div class="pref-grid">' +
                '<div class="pref-item"><div class="label">M&iacute;nimo</div><div class="value">' + (data.rango_min ? data.rango_min.toLocaleString('es-AR') : '-') + '</div></div>' +
                '<div class="pref-item"><div class="label">M&aacute;ximo</div><div class="value">' + (data.rango_max ? data.rango_max.toLocaleString('es-AR') : '-') + '</div></div>' +
                '<div class="pref-item"><div class="label">Moneda</div><div class="value">' + (data.es_usd ? 'USD' : 'ARS') + '</div></div>' +
                '<div class="pref-item"><div class="label">Ambientes</div><div class="value">' + (data.ambientes || '-') + '</div></div>' +
                '<div class="pref-item"><div class="label">Operaci&oacute;n</div><div class="value">' + esc(data.operacion || '-') + '</div></div>' +
            '</div>' +
        '</div>';
    }

    function renderPropiedades(data) {
        var esProp = data.tipo === 'propietario';
        var props  = esProp ? (data.propiedades_propietario || []) : (data.propiedades_interesado || []);
        var rol    = esProp ? 'propietarios' : 'interesados';
        var titulo = esProp ? '&#x1F3D8; Propiedades' : '&#x1F3E0; Propiedades de inter&eacute;s';

        var tabla = props.length === 0
            ? '<p style="color:#64748b;margin:0 0 4px">Sin propiedades asociadas.</p>'
            : '<div class="table-wrap" style="margin-bottom:4px"><table>' +
                '<thead><tr><th>C&oacute;digo</th><th>Direcci&oacute;n</th><th>Estado</th><th class="no-print"></th></tr></thead>' +
                '<tbody>' + props.map(function(p) {
                    return '<tr>' +
                        '<td><a href="/admin/propiedad/' + p.id + '">' + esc(p.codigo || ('#' + p.id)) + '</a></td>' +
                        '<td><a href="/admin/propiedad/' + p.id + '">' + esc(p.direccion || '—') + '</a></td>' +
                        '<td><span class="badge badge-' + esc(p.estado) + '">' + esc(p.estado) + '</span></td>' +
                        '<td class="no-print"><button class="btn-action btn-cancel" ' +
                            'onclick="desasignarPropiedad(' + p.id + ',\'' + rol + '\')">&#x2715;</button></td>' +
                    '</tr>';
                }).join('') +
                '</tbody></table></div>';

        return '<div class="section-card"><h2>' + titulo + '</h2>' +
            tabla +
            '<hr class="inter-sep">' +
            '<p class="inter-subtitulo">Disponibles para asignar</p>' +
            '<input type="text" id="buscar-propiedad-cli" placeholder="Filtrar propiedades..." ' +
                'autocomplete="off" oninput="filtrarDisponiblesProp(this)" ' +
                'style="width:100%;font-size:13px;padding:8px 12px;border:1px solid var(--border);border-radius:6px;box-sizing:border-box;margin-bottom:0">' +
            '<div id="buscar-prop-cli-resultados"></div>' +
        '</div>';
    }

    function renderNotas(data) {
        return '<div class="section-card"><h2>&#x1F4DD; Notas del cliente</h2>' +
            '<textarea id="descripcion" class="notes-textarea" ' +
                'placeholder="Notas sobre este cliente...">' + esc(data.descripcion || '') + '</textarea>' +
            '<div style="margin-top:10px;display:flex;align-items:center">' +
                '<button class="btn btn-green" onclick="guardarDescripcion()">Guardar</button>' +
                '<span id="save-confirm" class="save-confirm">&#x2713; Guardado</span>' +
            '</div>' +
        '</div>';
    }

    // ── Inline disponibles list ───────────────────────────────────────────────
    function renderDispListProp(listId, vinculadas, rol) {
        var list = document.getElementById(listId);
        if (!list) return;
        list.innerHTML = '<p class="disp-empty">Cargando...</p>';
        function doRender(propiedades) {
            if (!propiedades) {
                list.innerHTML = '<p class="disp-empty" style="color:#dc2626">Error al cargar propiedades.</p>';
                return;
            }
            var disponibles = propiedades.filter(function(p) { return !vinculadas[p.id]; });
            if (!disponibles.length) {
                list.innerHTML = '<p class="disp-empty">No hay propiedades disponibles.</p>';
                return;
            }
            list.innerHTML = disponibles.map(function(p) {
                var label = (p.codigo ? '[' + esc(p.codigo) + '] ' : '') + esc(p.direccion || '(sin dirección)');
                var qStr  = esc(((p.codigo || '') + ' ' + (p.direccion || '') + ' ' + (p.estado || '') + ' ' + (p.barrio || '')).toLowerCase());
                return '<div class="inter-row" data-q="' + qStr + '">' +
                    '<span class="inter-nombre"><a href="/admin/propiedad/' + p.id + '" target="_blank">' + label + '</a></span>' +
                    (p.estado ? '<span class="badge badge-' + esc(p.estado) + '" style="font-size:10px">' + esc(p.estado) + '</span>' : '') +
                    '<button class="btn-action btn-match" onclick="asignarPropiedad(' + p.id + ',\'' + rol + '\')" style="font-size:11px;white-space:nowrap">+ Asignar</button>' +
                '</div>';
            }).join('');
        }
        if (!_propiedadesCache) {
            fetch('/api/propiedades')
                .then(function(r) { return r.json(); })
                .then(function(data) { _propiedadesCache = data; doRender(data); })
                .catch(function() { doRender(null); });
        } else {
            doRender(_propiedadesCache);
        }
    }

    function filtrarDisponiblesProp(input) {
        var q    = input.value.trim().toLowerCase();
        var list = document.getElementById('buscar-prop-cli-resultados');
        if (!list) return;
        var rows = list.querySelectorAll('.inter-row[data-q]');
        var visible = 0;
        rows.forEach(function(r) {
            var show = !q || r.dataset.q.includes(q);
            r.style.display = show ? '' : 'none';
            if (show) visible++;
        });
        var emp = list.querySelector('.disp-empty-filter');
        if (!emp) {
            emp = document.createElement('p');
            emp.className = 'disp-empty disp-empty-filter';
            list.appendChild(emp);
        }
        emp.textContent = visible === 0 ? 'Sin resultados para "' + q + '"' : '';
        emp.style.display = visible === 0 ? '' : 'none';
    }

    // ── Asignación de propiedades ─────────────────────────────────────────────
    function asignarPropiedad(propId, rol) {
        _propiedadesCache = null;
        fetch('/api/propiedades/' + propId + '/' + rol + '/' + clienteId, { method: 'POST' })
            .then(function() { toast('Propiedad asignada', 'success'); cargarPerfil(); })
            .catch(function() { toast('Error al asignar', 'error'); });
    }

    function desasignarPropiedad(propId, rol) {
        _propiedadesCache = null;
        fetch('/api/propiedades/' + propId + '/' + rol + '/' + clienteId, { method: 'DELETE' })
            .then(function() { toast('Propiedad quitada', 'success'); cargarPerfil(); })
            .catch(function() { toast('Error al quitar', 'error'); });
    }

    // ── Notas ─────────────────────────────────────────────────────────────────
    function guardarDescripcion() {
        fetch('/api/clientes/' + clienteId, {
            method: 'PUT', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ descripcion: document.getElementById('descripcion').value })
        }).then(function() {
            var el = document.getElementById('save-confirm');
            el.style.display = 'inline';
            setTimeout(function() { el.style.display = 'none'; }, 2000);
        }).catch(function(e) { console.error('Error al guardar descripción', e); });
    }

    document.addEventListener('DOMContentLoaded', cargarPerfil);
</script>
{% endblock %}
