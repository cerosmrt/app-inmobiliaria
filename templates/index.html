<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inmobiliaria</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 10px; background-color: #f0f0f0; }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { font-size: 20px; text-align: center; margin-bottom: 10px; }
        .tab-nav { display: flex; gap: 4px; margin-bottom: 10px; }
        .tab-btn { font-size: 13px; padding: 6px 18px; border: 1px solid #ccc; background: #ddd; cursor: pointer; border-bottom: none; }
        .tab-btn.active { background: #fff; font-weight: bold; border-bottom: 1px solid #fff; }
        .btn-add { font-size: 12px; padding: 4px 8px; background-color: #28a745; color: white; border: none; cursor: pointer; margin-bottom: 5px; }
        .btn-reset { font-size: 12px; padding: 4px 8px; background-color: #dc3545; color: white; border: none; cursor: pointer; margin-bottom: 5px; }
        .filterbox { margin-bottom: 10px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .filterbox input, .filterbox select { font-size: 12px; padding: 2px; border: 1px solid #ccc; }
        .toggle-box { margin-bottom: 10px; display: flex; gap: 20px; }
        .toggle-box label { font-size: 12px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #ccc; padding: 4px; text-align: left; }
        th { background-color: #e0e0e0; font-weight: bold; }
        .editable-text:hover, .editable-select:hover { background-color: #e9ecef; cursor: pointer; }
        input, select { font-size: 12px; padding: 2px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; }
        .new-row { background-color: #d4edda; }
        .btn-action { font-size: 10px; padding: 2px 4px; border: none; cursor: pointer; }
        .btn-save { background-color: #28a745; color: white; }
        .btn-cancel { background-color: #dc3545; color: white; }
        .btn-match { background-color: #007bff; color: white; }
        a:visited { color: inherit; }
        .estado-disponible { color: #28a745; font-weight: bold; }
        .estado-vendida { color: #dc3545; }
        .estado-rentada { color: #fd7e14; }
        /* Modal de matches */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; padding: 20px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto; border-radius: 4px; }
        .modal-box h3 { margin-top: 0; font-size: 16px; }
        .modal-close { float: right; cursor: pointer; font-size: 18px; background: none; border: none; }
        @media print {
            .tab-nav, .filterbox, .toggle-box, .btn-add, .btn-reset, .btn-action, .no-print { display: none !important; }
            body { background: white; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Inmobiliaria</h1>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="mostrarTab('clientes')">Clientes</button>
            <button class="tab-btn" onclick="mostrarTab('propiedades')">Propiedades</button>
        </div>

        <!-- TAB CLIENTES -->
        <div id="tab-clientes">
            <div class="no-print">
                <button class="btn-add" onclick="agregarFilaCliente()">Añadir cliente</button>
                <button class="btn-add" onclick="imprimirTabla('tablaClientes', 'Clientes')">Imprimir</button>
                <button class="btn-reset" onclick="resetFiltrosClientes()">Limpiar filtros</button>
            </div>

            <div class="toggle-box no-print">
                <label><input type="checkbox" id="togglePropietarios" onchange="filtrarClientes()"> Propietarios</label>
                <label><input type="checkbox" id="toggleInteresados" onchange="filtrarClientes()"> Interesados</label>
            </div>

            <div class="filterbox no-print">
                <input type="text" id="filtroTexto" placeholder="Nombre o Apellido" onkeyup="filtrarClientes()">
                <select id="filtroOperacion" onchange="filtrarClientes()">
                    <option value="">Operación</option>
                    <option value="venta">Venta</option>
                    <option value="renta">Renta</option>
                    <option value="ambas">Ambas</option>
                </select>
                <input type="number" id="filtroAmbientes" placeholder="Ambientes" onkeyup="filtrarClientes()">
            </div>

            <table id="tablaClientes">
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Teléfono</th>
                        <th>Email</th>
                        <th>Tipo</th>
                        <th>Min</th>
                        <th>Max</th>
                        <th>USD</th>
                        <th>Amb</th>
                        <th>Operación</th>
                        <th class="no-print">Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- TAB PROPIEDADES -->
        <div id="tab-propiedades" style="display:none">
            <div class="no-print">
                <button class="btn-add" onclick="agregarFilaPropiedad()">Añadir propiedad</button>
                <button class="btn-add" onclick="imprimirTabla('tablaPropiedades', 'Propiedades')">Imprimir</button>
                <button class="btn-reset" onclick="resetFiltrosPropiedades()">Limpiar filtros</button>
            </div>

            <div class="filterbox no-print">
                <input type="text" id="filtroDireccion" placeholder="Dirección" onkeyup="filtrarPropiedades()">
                <select id="filtroTipo" onchange="filtrarPropiedades()">
                    <option value="">Tipo</option>
                    <option value="casa">Casa</option>
                    <option value="departamento">Departamento</option>
                    <option value="local">Local</option>
                    <option value="terreno">Terreno</option>
                    <option value="otro">Otro</option>
                </select>
                <select id="filtroEstado" onchange="filtrarPropiedades()">
                    <option value="">Estado</option>
                    <option value="disponible">Disponible</option>
                    <option value="vendida">Vendida</option>
                    <option value="rentada">Rentada</option>
                </select>
                <input type="number" id="filtroAmbiendesProp" placeholder="Ambientes" onkeyup="filtrarPropiedades()">
            </div>

            <table id="tablaPropiedades">
                <thead>
                    <tr>
                        <th>Dirección</th>
                        <th>Tipo</th>
                        <th>Estado</th>
                        <th>Min</th>
                        <th>Max</th>
                        <th>USD</th>
                        <th>Amb</th>
                        <th>Propietario</th>
                        <th>Interesados</th>
                        <th class="no-print">Acciones</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- Modal compradores compatibles -->
    <div id="modal-matches" class="modal-overlay">
        <div class="modal-box">
            <button class="modal-close" onclick="cerrarModal()">✕</button>
            <h3 id="modal-titulo">Compradores compatibles</h3>
            <div id="modal-contenido"></div>
        </div>
    </div>

    <script>
        let clientes = [];
        let propiedades = [];

        // ── TABS ─────────────────────────────────────────────────────────────
        function mostrarTab(tab) {
            document.getElementById('tab-clientes').style.display = tab === 'clientes' ? '' : 'none';
            document.getElementById('tab-propiedades').style.display = tab === 'propiedades' ? '' : 'none';
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'propiedades' && propiedades.length === 0) cargarPropiedades();
        }

        // ── PRINT ─────────────────────────────────────────────────────────────
        function imprimirTabla(tablaId, titulo) {
            const tabla = document.getElementById(tablaId).outerHTML;
            const ventana = window.open('', '_blank');
            const fecha = new Date().toLocaleDateString('es-AR');
            ventana.document.write(`
                <html><head><title>${titulo} - ${fecha}</title>
                <style>
                    body { font-family: Arial, sans-serif; }
                    table { width: 100%; border-collapse: collapse; font-size: 11px; }
                    th, td { border: 1px solid #ccc; padding: 3px 5px; text-align: left; }
                    th { background-color: #e0e0e0; }
                    a { text-decoration: none; color: black; }
                    .no-print { display: none; }
                </style></head>
                <body>
                    <h2 style="font-size:16px">${titulo} — ${fecha}</h2>
                    ${tabla}
                </body></html>
            `);
            ventana.document.close();
            ventana.print();
        }

        // ── CLIENTES ──────────────────────────────────────────────────────────
        function cargarClientes() {
            fetch('/api/clientes')
                .then(r => r.json())
                .then(data => {
                    clientes = data.sort((a, b) => (a.nombre + a.apellido).localeCompare(b.nombre + b.apellido));
                    filtrarClientes();
                });
        }

        function filtrarClientes() {
            const texto = document.getElementById('filtroTexto').value.toLowerCase();
            const operacion = document.getElementById('filtroOperacion').value;
            const ambientes = document.getElementById('filtroAmbientes').value;
            const showProp = document.getElementById('togglePropietarios').checked;
            const showInt = document.getElementById('toggleInteresados').checked;

            const filtrados = clientes.filter(c => {
                const matchTexto = c.nombre.toLowerCase().includes(texto) || c.apellido.toLowerCase().includes(texto);
                const matchOp = !operacion || c.operacion === operacion;
                const matchAmb = !ambientes || c.ambientes == ambientes;
                const matchTipo = (!showProp && !showInt) ||
                    (showProp && !showInt && c.tipo === 'propietario') ||
                    (!showProp && showInt && c.tipo === 'interesado') ||
                    (showProp && showInt);
                return matchTexto && matchOp && matchAmb && matchTipo;
            });

            const tbody = document.querySelector('#tablaClientes tbody');
            tbody.innerHTML = '';
            filtrados.forEach(c => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><a href="/cliente/${c.id}" class="editable-text" data-field="nombre" data-id="${c.id}">${c.nombre} ${c.apellido}</a></td>
                    <td class="editable-text" data-field="telefono" data-id="${c.id}">${c.telefono}</td>
                    <td class="editable-text" data-field="email" data-id="${c.id}">${c.email || ''}</td>
                    <td class="editable-select" data-field="tipo" data-id="${c.id}">${c.tipo}</td>
                    <td class="editable-text" data-field="rango_min" data-id="${c.id}">${c.rango_min || ''}</td>
                    <td class="editable-text" data-field="rango_max" data-id="${c.id}">${c.rango_max || ''}</td>
                    <td><input type="checkbox" data-field="es_usd" data-id="${c.id}" ${c.es_usd ? 'checked' : ''} onchange="actualizarCliente(${c.id}, 'es_usd', this.checked)"></td>
                    <td class="editable-text" data-field="ambientes" data-id="${c.id}">${c.ambientes || ''}</td>
                    <td class="editable-select" data-field="operacion" data-id="${c.id}">${c.operacion || ''}</td>
                    <td class="no-print">
                        <button class="btn-action btn-cancel" onclick="eliminarCliente(${c.id})">X</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
            agregarEventosEdicionTextoClientes();
            agregarEventosEdicionSelectClientes();
        }

        function resetFiltrosClientes() {
            document.getElementById('togglePropietarios').checked = false;
            document.getElementById('toggleInteresados').checked = false;
            document.getElementById('filtroTexto').value = '';
            document.getElementById('filtroOperacion').value = '';
            document.getElementById('filtroAmbientes').value = '';
            filtrarClientes();
        }

        function agregarFilaCliente() {
            const tbody = document.querySelector('#tablaClientes tbody');
            const row = document.createElement('tr');
            row.classList.add('new-row');
            row.innerHTML = `
                <td class="editable-text" data-field="nombre"><input type="text" placeholder="Nombre Apellido"></td>
                <td class="editable-text" data-field="telefono"><input type="text" placeholder="Teléfono"></td>
                <td class="editable-text" data-field="email"><input type="text" placeholder="Email"></td>
                <td class="editable-select" data-field="tipo">
                    <select><option value="interesado">Interesado</option><option value="propietario">Propietario</option></select>
                </td>
                <td class="editable-text" data-field="rango_min"><input type="number" placeholder="Min"></td>
                <td class="editable-text" data-field="rango_max"><input type="number" placeholder="Max"></td>
                <td><input type="checkbox" data-field="es_usd"></td>
                <td class="editable-text" data-field="ambientes"><input type="number" placeholder="Amb"></td>
                <td class="editable-select" data-field="operacion">
                    <select><option value="venta">Venta</option><option value="renta">Renta</option><option value="ambas">Ambas</option></select>
                </td>
                <td class="no-print">
                    <button class="btn-action btn-save" onclick="guardarNuevoCliente(this)">✔</button>
                    <button class="btn-action btn-cancel" onclick="this.closest('tr').remove()">X</button>
                </td>
            `;
            tbody.insertBefore(row, tbody.firstChild);
        }

        function guardarNuevoCliente(btn) {
            const row = btn.closest('tr');
            const nombreCompleto = row.querySelector('[data-field="nombre"] input').value.split(' ');
            const cliente = {
                nombre: nombreCompleto[0] || '',
                apellido: nombreCompleto.slice(1).join(' ') || '',
                telefono: row.querySelector('[data-field="telefono"] input').value,
                email: row.querySelector('[data-field="email"] input').value || null,
                tipo: row.querySelector('[data-field="tipo"] select').value,
                rango_min: parseFloat(row.querySelector('[data-field="rango_min"] input').value) || null,
                rango_max: parseFloat(row.querySelector('[data-field="rango_max"] input').value) || null,
                es_usd: row.querySelector('[data-field="es_usd"]').checked,
                ambientes: parseInt(row.querySelector('[data-field="ambientes"] input').value) || null,
                operacion: row.querySelector('[data-field="operacion"] select').value,
                descripcion: ''
            };
            if (!cliente.nombre || !cliente.apellido || !cliente.telefono) {
                alert('Completá Nombre, Apellido y Teléfono.');
                return;
            }
            fetch('/api/clientes', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(cliente) })
                .then(r => r.json())
                .then(() => { cargarClientes(); alert('Cliente agregado'); })
                .catch(e => alert('Error: ' + e));
        }

        function eliminarCliente(id) {
            if (confirm('¿Seguro querés borrar este cliente?')) {
                fetch(`/api/clientes/${id}`, { method: 'DELETE' })
                    .then(() => { cargarClientes(); })
                    .catch(e => alert('Error: ' + e));
            }
        }

        function actualizarCliente(id, field, value) {
            fetch(`/api/clientes/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ [field]: value }) })
                .then(() => cargarClientes())
                .catch(e => alert('Error: ' + e));
        }

        function agregarEventosEdicionTextoClientes() {
            document.querySelectorAll('#tablaClientes .editable-text').forEach(cell => {
                cell.addEventListener('dblclick', function(e) {
                    if (this.querySelector('input') || e.target.tagName === 'A') return;
                    const id = this.dataset.id;
                    const field = this.dataset.field;
                    const oldValue = this.textContent.trim();
                    this.innerHTML = `<input type="${field.includes('rango') || field === 'ambientes' ? 'number' : 'text'}" value="${oldValue}">`;
                    const input = this.querySelector('input');
                    input.focus();
                    const save = () => {
                        const newValue = input.value.trim();
                        if (newValue !== oldValue) {
                            if (field === 'nombre') {
                                const [nombre, ...rest] = newValue.split(' ');
                                actualizarCliente(id, 'nombre', nombre);
                                if (rest.length) actualizarCliente(id, 'apellido', rest.join(' '));
                            } else {
                                actualizarCliente(id, field, field.includes('rango') || field === 'ambientes' ? parseFloat(newValue) || null : newValue);
                            }
                        } else {
                            this.innerHTML = id ? `<a href="/cliente/${id}">${oldValue}</a>` : oldValue;
                        }
                    };
                    input.addEventListener('blur', save);
                    input.addEventListener('keypress', e => { if (e.key === 'Enter') input.blur(); });
                });
            });
        }

        function agregarEventosEdicionSelectClientes() {
            document.querySelectorAll('#tablaClientes .editable-select').forEach(cell => {
                cell.addEventListener('click', function() {
                    if (this.querySelector('select')) return;
                    const id = this.dataset.id;
                    const field = this.dataset.field;
                    const oldValue = this.textContent.trim();
                    const options = field === 'tipo'
                        ? '<option value="interesado">Interesado</option><option value="propietario">Propietario</option>'
                        : '<option value="venta">Venta</option><option value="renta">Renta</option><option value="ambas">Ambas</option>';
                    this.innerHTML = `<select>${options}</select>`;
                    const sel = this.querySelector('select');
                    sel.value = oldValue;
                    sel.focus();
                    sel.addEventListener('change', () => actualizarCliente(id, field, sel.value));
                });
            });
        }

        // ── PROPIEDADES ───────────────────────────────────────────────────────
        function cargarPropiedades() {
            fetch('/api/propiedades')
                .then(r => r.json())
                .then(data => {
                    propiedades = data.sort((a, b) => a.direccion.localeCompare(b.direccion));
                    filtrarPropiedades();
                });
        }

        function filtrarPropiedades() {
            const dir = document.getElementById('filtroDireccion').value.toLowerCase();
            const tipo = document.getElementById('filtroTipo').value;
            const estado = document.getElementById('filtroEstado').value;
            const amb = document.getElementById('filtroAmbiendesProp').value;

            const filtradas = propiedades.filter(p => {
                const matchDir = !dir || p.direccion.toLowerCase().includes(dir);
                const matchTipo = !tipo || p.tipo === tipo;
                const matchEstado = !estado || p.estado === estado;
                const matchAmb = !amb || p.ambientes == amb;
                return matchDir && matchTipo && matchEstado && matchAmb;
            });

            const tbody = document.querySelector('#tablaPropiedades tbody');
            tbody.innerHTML = '';
            filtradas.forEach(p => {
                const estadoClass = p.estado === 'disponible' ? 'estado-disponible' : p.estado === 'vendida' ? 'estado-vendida' : 'estado-rentada';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="editable-text" data-field="direccion" data-id="${p.id}">${p.direccion}</td>
                    <td class="editable-select-prop" data-field="tipo" data-id="${p.id}">${p.tipo || ''}</td>
                    <td class="editable-select-prop ${estadoClass}" data-field="estado" data-id="${p.id}">${p.estado || ''}</td>
                    <td class="editable-text" data-field="rango_min" data-id="${p.id}">${p.rango_min || ''}</td>
                    <td class="editable-text" data-field="rango_max" data-id="${p.id}">${p.rango_max || ''}</td>
                    <td><input type="checkbox" ${p.es_usd ? 'checked' : ''} onchange="actualizarPropiedad(${p.id}, 'es_usd', this.checked)"></td>
                    <td class="editable-text" data-field="ambientes" data-id="${p.id}">${p.ambientes || ''}</td>
                    <td>${p.propietario || '-'}</td>
                    <td>${p.interesados.join(', ') || '-'}</td>
                    <td class="no-print">
                        <button class="btn-action btn-match" onclick="verMatches(${p.id}, '${p.direccion.replace(/'/g, "\\'")}')">⚡</button>
                        <button class="btn-action btn-cancel" onclick="eliminarPropiedad(${p.id})">X</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
            agregarEventosEdicionTextoPropiedades();
            agregarEventosEdicionSelectPropiedades();
        }

        function resetFiltrosPropiedades() {
            document.getElementById('filtroDireccion').value = '';
            document.getElementById('filtroTipo').value = '';
            document.getElementById('filtroEstado').value = '';
            document.getElementById('filtroAmbiendesProp').value = '';
            filtrarPropiedades();
        }

        function agregarFilaPropiedad() {
            const propietarios = clientes.filter(c => c.tipo === 'propietario');
            const optsPropietarios = propietarios.map(c => `<option value="${c.id}">${c.nombre} ${c.apellido}</option>`).join('');
            const tbody = document.querySelector('#tablaPropiedades tbody');
            const row = document.createElement('tr');
            row.classList.add('new-row');
            row.innerHTML = `
                <td><input type="text" placeholder="Dirección"></td>
                <td><select>
                    <option value="casa">Casa</option>
                    <option value="departamento">Departamento</option>
                    <option value="local">Local</option>
                    <option value="terreno">Terreno</option>
                    <option value="otro">Otro</option>
                </select></td>
                <td><select>
                    <option value="disponible">Disponible</option>
                    <option value="vendida">Vendida</option>
                    <option value="rentada">Rentada</option>
                </select></td>
                <td><input type="number" placeholder="Min"></td>
                <td><input type="number" placeholder="Max"></td>
                <td><input type="checkbox"></td>
                <td><input type="number" placeholder="Amb"></td>
                <td><select><option value="">-- Sin propietario --</option>${optsPropietarios}</select></td>
                <td>-</td>
                <td class="no-print">
                    <button class="btn-action btn-save" onclick="guardarNuevaPropiedad(this)">✔</button>
                    <button class="btn-action btn-cancel" onclick="this.closest('tr').remove()">X</button>
                </td>
            `;
            tbody.insertBefore(row, tbody.firstChild);
        }

        function guardarNuevaPropiedad(btn) {
            const row = btn.closest('tr');
            const tds = row.querySelectorAll('td');
            const propiedad = {
                direccion: tds[0].querySelector('input').value,
                tipo: tds[1].querySelector('select').value,
                estado: tds[2].querySelector('select').value,
                rango_min: parseFloat(tds[3].querySelector('input').value) || null,
                rango_max: parseFloat(tds[4].querySelector('input').value) || null,
                es_usd: tds[5].querySelector('input').checked,
                ambientes: parseInt(tds[6].querySelector('input').value) || null,
                propietario_id: parseInt(tds[7].querySelector('select').value) || null
            };
            if (!propiedad.direccion) { alert('Ingresá la dirección.'); return; }
            fetch('/api/propiedades', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(propiedad) })
                .then(r => r.json())
                .then(() => { cargarPropiedades(); alert('Propiedad agregada'); })
                .catch(e => alert('Error: ' + e));
        }

        function eliminarPropiedad(id) {
            if (confirm('¿Seguro querés borrar esta propiedad?')) {
                fetch(`/api/propiedades/${id}`, { method: 'DELETE' })
                    .then(() => cargarPropiedades())
                    .catch(e => alert('Error: ' + e));
            }
        }

        function actualizarPropiedad(id, field, value) {
            fetch(`/api/propiedades/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ [field]: value }) })
                .then(() => cargarPropiedades())
                .catch(e => alert('Error: ' + e));
        }

        function agregarEventosEdicionTextoPropiedades() {
            document.querySelectorAll('#tablaPropiedades .editable-text').forEach(cell => {
                cell.addEventListener('dblclick', function() {
                    if (this.querySelector('input')) return;
                    const id = this.dataset.id;
                    const field = this.dataset.field;
                    const oldValue = this.textContent.trim();
                    this.innerHTML = `<input type="${field.includes('rango') || field === 'ambientes' ? 'number' : 'text'}" value="${oldValue}">`;
                    const input = this.querySelector('input');
                    input.focus();
                    input.addEventListener('blur', () => {
                        const newValue = input.value.trim();
                        if (newValue !== oldValue) {
                            actualizarPropiedad(id, field, field.includes('rango') || field === 'ambientes' ? parseFloat(newValue) || null : newValue);
                        } else {
                            this.textContent = oldValue;
                        }
                    });
                    input.addEventListener('keypress', e => { if (e.key === 'Enter') input.blur(); });
                });
            });
        }

        function agregarEventosEdicionSelectPropiedades() {
            document.querySelectorAll('#tablaPropiedades .editable-select-prop').forEach(cell => {
                cell.addEventListener('click', function() {
                    if (this.querySelector('select')) return;
                    const id = this.dataset.id;
                    const field = this.dataset.field;
                    const oldValue = this.textContent.trim();
                    const options = field === 'tipo'
                        ? ['casa', 'departamento', 'local', 'terreno', 'otro'].map(v => `<option value="${v}">${v}</option>`).join('')
                        : ['disponible', 'vendida', 'rentada'].map(v => `<option value="${v}">${v}</option>`).join('');
                    this.innerHTML = `<select>${options}</select>`;
                    const sel = this.querySelector('select');
                    sel.value = oldValue;
                    sel.focus();
                    sel.addEventListener('change', () => actualizarPropiedad(id, field, sel.value));
                });
            });
        }

        // ── MATCHES ───────────────────────────────────────────────────────────
        function verMatches(propId, direccion) {
            fetch(`/api/propiedades/${propId}/matches`)
                .then(r => r.json())
                .then(matches => {
                    document.getElementById('modal-titulo').textContent = `Compradores compatibles — ${direccion}`;
                    if (matches.length === 0) {
                        document.getElementById('modal-contenido').innerHTML = '<p>No hay interesados compatibles con esta propiedad.</p>';
                    } else {
                        document.getElementById('modal-contenido').innerHTML = `
                            <table>
                                <thead><tr><th>Nombre</th><th>Teléfono</th><th>Email</th><th>Min</th><th>Max</th><th>USD</th><th>Amb</th><th>Operación</th></tr></thead>
                                <tbody>
                                    ${matches.map(m => `
                                        <tr>
                                            <td><a href="/cliente/${m.id}">${m.nombre} ${m.apellido}</a></td>
                                            <td>${m.telefono}</td>
                                            <td>${m.email || '-'}</td>
                                            <td>${m.rango_min || '-'}</td>
                                            <td>${m.rango_max || '-'}</td>
                                            <td>${m.es_usd ? 'Sí' : 'No'}</td>
                                            <td>${m.ambientes || '-'}</td>
                                            <td>${m.operacion || '-'}</td>
                                        </tr>
                                    `).join('')}
                                </tbody>
                            </table>
                        `;
                    }
                    document.getElementById('modal-matches').classList.add('active');
                })
                .catch(e => alert('Error al buscar compradores: ' + e));
        }

        function cerrarModal() {
            document.getElementById('modal-matches').classList.remove('active');
        }

        document.getElementById('modal-matches').addEventListener('click', e => {
            if (e.target === document.getElementById('modal-matches')) cerrarModal();
        });

        // ── INIT ──────────────────────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', cargarClientes);
    </script>
</body>
</html>
